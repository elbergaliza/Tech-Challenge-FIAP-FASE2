name: infra-terraform

on:
  push:
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/infra.yml'
  pull_request:
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/infra.yml'

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan \
            -var="project_name=${{ vars.PROJECT_NAME || 'tech-challenge' }}" \
            -var="environment=${{ vars.ENVIRONMENT || 'dev' }}" \
            -var="github_repository=${{ github.repository }}" \
            -var="notification_email=${{ vars.BUDGET_ALERT_EMAIL || 'change-me@example.com' }}"
